<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rei Emmanuel Cristobal | Portfolio</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css"
    />

    <style>
      /* Custom CSS to make the Hero section look taller and centered */
      .hero-section {
        background-color: #f8f9fa; /* Light gray background */
        min-height: 100vh; /* Takes up 100% of the screen height */
        display: flex;
        align-items: center; /* Vertically centers content */
      }
      .profile-img {
        width: 250px;
        height: 250px;
        object-fit: cover;
        border-radius: 50%; /* Makes the image a circle */
        border: 5px solid white;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
      <div class="container">
        <a class="navbar-brand" href="#">Rei Cristobal</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
            <li class="nav-item">
              <a class="nav-link" href="#about">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#projects">Projects</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#contact">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <section id="home" class="hero-section text-center text-lg-start">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-lg-6">
            <h1 class="display-4 fw-bold">Hi, I'm Rei!</h1>
            <h3 class="text-muted">
              Aspiring Web Developer & Project Coordinator
            </h3>
            <p class="lead mt-3">
              Transitioning from Physics to IT. I specialize in documentation,
              QA testing, and building organized web projects.
            </p>
            <div class="mt-4">
              <a href="#projects" class="btn btn-primary btn-lg me-2"
                >View My Projects</a
              >
              <a
                href="mailto:reiman.cristobal@gmail.com"
                class="btn btn-outline-dark btn-lg"
                >Contact Me</a
              >
            </div>
          </div>

          <div class="col-lg-6 text-center mt-5 mt-lg-0">
            <img
              src="https://placekitten.com/300/300"
              alt="Rei Cristobal"
              class="profile-img"
            />
          </div>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
